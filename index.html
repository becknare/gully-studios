<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Gully Studios — art direction, graphic & motion design by Bobby Rahman, Stockholm.">
  <title>gully studios</title>
  <link rel="preload" as="image" href="images/50fifty/fifty00009.webp" type="image/webp">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1><a href="#" id="home-link">gully studios*</a></h1>
    <p class="sub" id="right-pane">*is <u>not</u> a registered trademark, please do not steal it. :)</p>
  </header>

  <a href="mailto:albab.rahman98@gmail.com" class="contact">contact</a>

  <div class="hover-title" id="hover-title"></div>

  <main id="main"></main>

  <!-- Gallery View (same central column, replaces main content) -->
  <div class="gallery" id="gallery"></div>

  <script src="projects.js"></script>
  <script>
    const main = document.getElementById('main');
    const hoverTitle = document.getElementById('hover-title');
    const gallery = document.getElementById('gallery');
    const rightPane = document.getElementById('right-pane');
    const homeLink = document.getElementById('home-link');
    const contactLink = document.querySelector('.contact');

    const subtitleHTML = '*is <u>not</u> a registered trademark, please do not steal it. :)';

    function renderMedia(src, alt, lazy, w, h) {
      const ext = src.split('.').pop().toLowerCase();
      const isVideo = ['mp4', 'webm', 'mov'].includes(ext);
      const dims = w ? `width="${w}" height="${h}"` : '';

      if (isVideo) {
        return `<video src="${src}" ${dims} autoplay loop muted playsinline preload="metadata"></video>`;
      }
      return `<img src="${src}" alt="${alt}" ${dims} ${lazy ? 'loading="lazy"' : ''}>`;
    }

    // Build thumbnails from projects.js
    projects.forEach((project, index) => {
      const item = document.createElement('div');
      item.className = 'image-item';

      const thumbSrc = project.thumbnailSmall || project.thumbnail;
      item.innerHTML = renderMedia(thumbSrc, project.title, index > 0, project.thumbnailWidth, project.thumbnailHeight);

      item.addEventListener('mouseenter', () => {
        hoverTitle.textContent = project.title;
        hoverTitle.classList.add('visible');
      });

      item.addEventListener('mouseleave', () => {
        hoverTitle.classList.remove('visible');
      });

      item.addEventListener('click', () => openGallery(index));

      main.appendChild(item);
    });

    // Gallery
    function openGallery(index) {
      const project = projects[index];

      gallery.innerHTML = project.images
        .map(src => renderMedia(src, project.title, true))
        .join('')
        + `<div class="gallery-text-mobile">${project.text}</div>`;

      // Swap right pane to project info
      rightPane.innerHTML = project.text;
      rightPane.classList.add('project-info');

      main.style.display = 'none';
      gallery.classList.add('active');
      hoverTitle.classList.remove('visible');
      window.scrollTo(0, 0);

      if (window.innerWidth > 768) {
        contactLink.textContent = 'back';
        contactLink.href = '#';
      }
    }

    function closeGallery() {
      // Pause any playing videos in gallery
      gallery.querySelectorAll('video').forEach(v => v.pause());

      main.style.display = '';
      gallery.classList.remove('active');
      rightPane.innerHTML = subtitleHTML;
      rightPane.classList.remove('project-info');

      contactLink.textContent = 'contact';
      contactLink.href = 'mailto:albab.rahman98@gmail.com';
    }

    contactLink.addEventListener('click', (e) => {
      if (gallery.classList.contains('active')) {
        e.preventDefault();
        closeGallery();
      }
    });

    homeLink.addEventListener('click', (e) => {
      e.preventDefault();
      if (gallery.classList.contains('active')) {
        closeGallery();
      }
    });

    rightPane.addEventListener('click', () => {
      if (rightPane.classList.contains('project-info')) {
        closeGallery();
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeGallery();
    });
  </script>

</body>
</html>
