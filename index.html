<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Gully Studios — art direction, graphic & motion design by Bobby Rahman, Stockholm.">
  <title>gully studios</title>
  <link rel="preload" as="image" href="images/50fifty/fifty00009.webp" type="image/webp">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #fff;
      color: rgba(0, 0, 0, 0.85);
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: 14.5px;
      line-height: 1.2;
      letter-spacing: 0em;
      -webkit-font-smoothing: antialiased;
    }

    /* ——— Splash ——— */

    .splash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #fff;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 400;
      color: rgba(0, 0, 0, 0.85);
      transition: opacity 0.9s ease;
    }

    .splash.done {
      opacity: 0;
      pointer-events: none;
    }

    /* ——— Page Transition ——— */

    .page-transition {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #fff;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .page-transition.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* ——— Header ——— */

    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      z-index: 100;
      pointer-events: none;
    }

    header h1 {
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 20%;
      text-align: center;
      font-size: 14.5px;
      font-weight: 400;
      line-height: 1.2;
      color: rgba(0, 0, 0, 0.85);
    }

    header h1 a {
      color: inherit;
      text-decoration: none;
      pointer-events: auto;
      cursor: pointer;
    }

    header .sub {
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 20%;
      text-align: center;
      font-size: 14.5px;
      font-weight: 400;
      line-height: 1.4;
      color: rgba(0, 0, 0, 0.85);
      padding: 0 12px;
    }

    header .sub u {
      text-underline-offset: 2px;
    }

    /* Right pane: project info mode */

    header .sub.project-info {
      top: 40px;
      transform: none;
      text-align: left;
      font-size: 14.5px;
      line-height: 1.55;
      overflow-y: auto;
      max-height: calc(100vh - 80px);
      padding: 0 20px;
    }

    header .sub.project-info h2 {
      font-size: 14.5px;
      font-weight: 400;
      line-height: 1.2;
      color: rgba(0, 0, 0, 0.85);
      margin-bottom: 20px;
    }

    header .sub.project-info p {
      font-size: 14.5px;
      font-weight: 400;
      line-height: 1.55;
      color: rgba(0, 0, 0, 0.75);
      margin-bottom: 16px;
    }

    header .sub.project-info .meta {
      font-size: 12px;
      line-height: 1.6;
      color: rgba(0, 0, 0, 0.4);
      margin-top: 20px;
    }

    /* ——— Contact ——— */

    .contact {
      position: fixed;
      bottom: 20px;
      left: 0;
      width: 20%;
      text-align: center;
      font-size: 14.5px;
      font-weight: 400;
      line-height: 1.2;
      color: rgba(0, 0, 0, 0.85);
      text-decoration: none;
      z-index: 100;
    }

    .contact:hover {
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    /* ——— Hover Title ——— */

    .hover-title {
      position: fixed;
      bottom: 20px;
      right: 0;
      width: 20%;
      text-align: center;
      font-size: 14.5px;
      font-weight: 400;
      line-height: 1.2;
      color: rgba(0, 0, 0, 0.85);
      z-index: 100;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .hover-title.visible {
      opacity: 1;
    }

    /* ——— Main ——— */

    main {
      padding-top: 0;
      padding-bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ——— Image Items (Thumbnails) ——— */

    .image-item {
      width: 60%;
      position: relative;
      cursor: pointer;
    }

    .image-item img,
    .image-item video {
      display: block;
      width: 100%;
      height: auto;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .image-item img.loaded,
    .image-item video.loaded {
      opacity: 1;
    }

    /* ——— Gallery View ——— */

    .gallery {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .gallery.active {
      display: flex;
    }

    .gallery img,
    .gallery video {
      display: block;
      width: 60%;
      height: auto;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .gallery img.loaded,
    .gallery video.loaded {
      opacity: 1;
    }

    .gallery-text-mobile {
      display: none;
    }

    /* ——— Mobile ——— */

    @media (max-width: 768px) {
      body {
        font-size: 16px;
      }

      .splash {
        font-size: 18px;
      }

      header {
        position: fixed;
        top: 0;
        height: auto;
        padding: 16px 20px;
        pointer-events: auto;
        background: transparent;
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        mix-blend-mode: difference;
        z-index: 100;
      }

      header h1 {
        position: static;
        transform: none;
        width: auto;
        text-align: left;
        font-size: 16px;
        color: #fff;
      }

      header h1 a {
        color: inherit;
      }

      header .sub {
        position: static;
        transform: none;
        width: auto;
        text-align: right;
        font-size: 16px;
        color: #fff;
        padding: 0;
        margin-top: 0;
      }

      /* On mobile, project info replaces subtitle inline */
      header .sub.project-info {
        top: auto;
        transform: none;
        max-height: none;
        overflow-y: visible;
        font-size: 16px;
        text-align: right;
        padding: 0;
      }

      header .sub.project-info h2,
      header .sub.project-info p,
      header .sub.project-info .meta {
        display: none;
      }

      header .sub.project-info::after {
        content: 'back';
        font-size: 16px;
      }

      header .sub.project-info {
        pointer-events: auto;
        cursor: pointer;
      }

      .contact {
        width: auto;
        left: 20px;
        bottom: 16px;
        font-size: 16px;
        color: #fff;
        mix-blend-mode: difference;
      }

      .hover-title {
        display: none;
      }

      .image-item {
        width: 100%;
      }

      .gallery img,
      .gallery video {
        width: 100%;
      }

      .gallery-text-mobile {
        display: block;
        width: 100%;
        padding: 24px 20px 60px;
        font-size: 15px;
        line-height: 1.55;
        color: rgba(0, 0, 0, 0.75);
      }

      .gallery-text-mobile h2 {
        font-size: 16px;
        font-weight: 400;
        color: rgba(0, 0, 0, 0.85);
        margin-bottom: 16px;
      }

      .gallery-text-mobile p {
        margin-bottom: 14px;
      }

      .gallery-text-mobile .meta {
        font-size: 12px;
        line-height: 1.6;
        color: rgba(0, 0, 0, 0.4);
        margin-top: 16px;
      }
    }
  </style>
</head>
<body>

  <div class="splash" id="splash">gully studios*</div>
  <div class="page-transition" id="page-transition"></div>

  <header>
    <h1><a href="#" id="home-link">gully studios*</a></h1>
    <p class="sub" id="right-pane">*is <u>not</u> a registered trademark, please do not steal it. :)</p>
  </header>

  <a href="mailto:albab.rahman98@gmail.com" class="contact">contact</a>

  <div class="hover-title" id="hover-title"></div>

  <main id="main"></main>

  <div class="gallery" id="gallery"></div>

  <script src="projects.js" defer></script>
  <script src="app.js" defer></script>

</body>
</html>
